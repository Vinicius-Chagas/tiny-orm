name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run pr agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK.KEY: ${{ secrets.DEEPSEEK_API_KEY }}

          # Modelo
          config.model: "deepseek/deepseek-v4-pro"
          config.fallback_models: '["deepseek/deepseek-chat"]'

          # Ferramentas automáticas ao abrir PR
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "false"

          # Foco do review: SOLID, Clean Code e Segurança
          pr_reviewer.extra_instructions: >
            Você está revisando código de um desenvolvedor que está aprendendo ativamente.
            Foque obrigatoriamente nestas três categorias:

            1. PRINCÍPIOS SOLID — identifique violações de SRP, OCP, LSP, ISP e DIP.
            Nomeie o princípio explicitamente em cada problema (ex: "Viola o SRP").

            2. CLEAN CODE — verifique: nomenclatura que revela intenção, funções com
            responsabilidade única, ausência de magic numbers/strings, DRY,
            complexidade ciclomática alta, comentários desnecessários.

            3. SEGURANÇA — verifique: inputs não sanitizados, dados sensíveis expostos
            em logs ou respostas, ausência de validação, secrets hardcoded,
            error handling que vaza detalhes internos.

            Para cada problema: descreva o que está errado, explique o impacto real,
            mostre como corrigir com exemplo de código, e nomeie o princípio violado.

            Ao final: liste pontos positivos e os 2-3 conceitos mais urgentes pra estudar.
            Tom: direto e encorajador, como um senior ensinando um junior.
            Use português brasileiro.

          pr_code_suggestions.extra_instructions: >
            Priorize sugestões em ordem:
            1. Correções de segurança
            2. Violações de SOLID
            3. Melhorias de Clean Code
            Explique cada sugestão em português brasileiro.

          pr_code_suggestions.commitable_code_suggestions: "true"
